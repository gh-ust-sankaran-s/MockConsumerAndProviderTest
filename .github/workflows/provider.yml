name: Provider CI

on:
  push:
    paths:
      - "omsProviderProj/**"
      - ".github/workflows/provider.yml"
  pull_request:
    paths:
      - "omsProviderProj/**"
      - ".github/workflows/provider.yml"

jobs:
  provider:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "22"
          cache: maven

      - name: Build provider
        working-directory: omsProviderProj
        run: mvn test
