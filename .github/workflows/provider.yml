name: Provider CI

on:
  push:
    paths:
      - "posConsumerProj/**"
      - "omsProviderProj/**"
      - ".github/workflows/provider.yml"
  pull_request:
    paths:
      - "posConsumerProj/**"
      - "omsProviderProj/**"
      - ".github/workflows/provider.yml"

jobs:
  provider:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "22"
          cache: maven

      - name: Generate common pact from consumer
        run: mvn -pl posConsumerProj test

      - name: Verify provider against common pact
        run: mvn -pl omsProviderProj test
